# Local test harness for the Apple Mail skin.
#   roundcube  — the webmail app, with our skin mounted and set as default
#   greenmail  — throwaway IMAP+SMTP server (auth disabled: any login works)
#
# Bring up:   docker compose up -d
# Open:       http://localhost:8095   (login: demo@localhost / anything)
# Seed mail:  python3 tools/seed-mail.py   (a few demo messages in the inbox)

services:
  greenmail:
    image: greenmail/standalone:2.1.0
    container_name: am-greenmail
    restart: unless-stopped
    environment:
      # test.all opens SMTP:3025 IMAP:3143 IMAPS:3993 POP3:3110
      GREENMAIL_OPTS: "-Dgreenmail.setup.test.all -Dgreenmail.hostname=0.0.0.0 -Dgreenmail.auth.disabled -Dgreenmail.verbose"
    ports:
      - "3025:3025"   # SMTP (for seeding demo mail from the host)
      - "3143:3143"   # IMAP

  roundcube:
    image: roundcube/roundcubemail:latest
    container_name: am-roundcube
    restart: unless-stopped
    depends_on:
      - greenmail
    environment:
      ROUNDCUBEMAIL_DEFAULT_HOST: "greenmail"
      ROUNDCUBEMAIL_DEFAULT_PORT: "3143"
      ROUNDCUBEMAIL_SMTP_SERVER: "greenmail"
      ROUNDCUBEMAIL_SMTP_PORT: "3025"
      ROUNDCUBEMAIL_DB_TYPE: "sqlite"
      ROUNDCUBEMAIL_SKIN: "applemail"
      ROUNDCUBEMAIL_USERNAME_DOMAIN: "localhost"
    ports:
      - "8095:80"
    volumes:
      # our skin, mounted live so edits + recompiled CSS show on refresh
      - ./skins/applemail:/var/www/html/skins/applemail:ro
