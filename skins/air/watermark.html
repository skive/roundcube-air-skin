<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title></title>
<style type="text/css">
  html, body { height: 100%; overflow: hidden; margin: 0; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    color: #a0a0a8;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
  }
  html.dark-mode > body { background: #1c1c1e; color: #67676c; }
  .env {
    width: 92px; height: 92px;
    opacity: .55;
    margin-bottom: 16px;
    color: #c7c7cf;
  }
  html.dark-mode .env { color: #48484c; opacity: .8; }
  .t1 { font-size: 16px; font-weight: 600; color: #6e6e73; }
  html.dark-mode .t1 { color: #98989d; }
  .t2 { font-size: 13px; margin-top: 3px; }
</style>
<script>
  try {
    if (document.cookie.indexOf('colorMode=dark') > -1
      || (document.cookie.indexOf('colorMode=light') === -1 && window.matchMedia('(prefers-color-scheme: dark)').matches)
    ) {
      document.documentElement.className += ' dark-mode';
    }
  } catch (e) { }
</script>
</head>
<body>
  <svg class="env" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.1">
    <rect x="3" y="5.5" width="18" height="13" rx="2.5"/>
    <path d="M3.5 7l8.5 6 8.5-6" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <div class="t1">Нет выбранного письма</div>
  <div class="t2">Выберите письмо для просмотра</div>
</body>
</html>
